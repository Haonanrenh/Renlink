spring:
  datasource:
    url: ${RENLINK_TEST_DB_URL:jdbc:h2:mem:renlinktestdb}
    driver-class-name: ${RENLINK_TEST_DB_DRIVER:org.h2.Driver}
    username: ${RENLINK_TEST_DB_USERNAME:sa}
    password: ${RENLINK_TEST_DB_PASSWORD:}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: ${JWT_SECRET:renlink-test-only-secret-key-change-before-sharing}

cors:
  allowed-origins: ${RENLINK_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4177,http://127.0.0.1:4177}
