spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:renlinkdb}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create-drop}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

jwt:
  secret: ${JWT_SECRET:renlink-dev-only-secret-key-change-before-sharing}

cors:
  allowed-origins: ${RENLINK_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:4177,http://127.0.0.1:4177}
